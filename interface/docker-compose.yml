# BETACLARITY — Docker Compose
#
# CPU / Apple Silicon (default):
#   docker compose up -d
#
# NVIDIA GPU:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  betaclarity:
    image: docker.io/odaxai/betaclarity:slim   # CPU + ONNX multi-arch (amd64 + arm64)
    container_name: betaclarity
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - betaclarity-sessions:/app/backend/sessions
      - betaclarity-models:/app/backend/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  betaclarity-sessions:
  betaclarity-models:
