# NVIDIA GPU override
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  betaclarity:
    image: docker.io/odaxai/betaclarity:cuda
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - BETACLARITY_BACKEND=pytorch-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
