name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'interface/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/betaclarity
  DOCKERHUB_IMAGE: odaxai/betaclarity

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: odaxai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (with Docker Hub)
        if: steps.dockerhub.outputs.available == 'true'
        id: meta-both
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Extract metadata (GHCR only)
        if: steps.dockerhub.outputs.available != 'true'
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push GPU image (both registries)
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./interface
          file: ./interface/Dockerfile
          push: true
          tags: ${{ steps.meta-both.outputs.tags }}
          labels: ${{ steps.meta-both.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

      - name: Build and push GPU image (GHCR only)
        if: steps.dockerhub.outputs.available != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./interface
          file: ./interface/Dockerfile
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

      # -----------------------------------------------------------------
      # Slim multi-arch image (CPU-only, ONNX Runtime, ~5x smaller).
      # Built for linux/amd64 + linux/arm64 so it runs on x86 servers,
      # Apple Silicon Macs (via Docker Desktop), and ARM SBCs.
      # -----------------------------------------------------------------
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Extract metadata for slim image (with Docker Hub)
        if: steps.dockerhub.outputs.available == 'true'
        id: meta-slim-both
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=slim
            type=raw,value=slim-{{sha}}

      - name: Extract metadata for slim image (GHCR only)
        if: steps.dockerhub.outputs.available != 'true'
        id: meta-slim-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=slim
            type=raw,value=slim-{{sha}}

      - name: Build and push slim image (both registries)
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./interface
          file: ./interface/Dockerfile.slim
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-slim-both.outputs.tags }}
          labels: ${{ steps.meta-slim-both.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim

      - name: Build and push slim image (GHCR only)
        if: steps.dockerhub.outputs.available != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./interface
          file: ./interface/Dockerfile.slim
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-slim-ghcr.outputs.tags }}
          labels: ${{ steps.meta-slim-ghcr.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
